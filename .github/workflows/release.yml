name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to package, for example v2.8"
        required: true
        default: "v2.8"
      publish_release:
        description: "Create/update the GitHub release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  package:
    name: Package single-file game
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build standalone HTML
        env:
          APP_VERSION: ${{ inputs.version }}
        run: python3 scripts/build-single-file.py

      - name: Upload packaged game artifact
        uses: actions/upload-artifact@v4
        with:
          name: snake-${{ inputs.version }}
          path: dist/snake-${{ inputs.version }}.html

      - name: Create GitHub release
        if: ${{ inputs.publish_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Snake ${{ inputs.version }}
          body: |
            Download `snake-${{ inputs.version }}.html` and open it in a browser to play Snake.

            This standalone file includes the HTML, CSS, and JavaScript for the game.
            Release publishing is manual from the workflow dispatch form.
          files: dist/snake-${{ inputs.version }}.html
