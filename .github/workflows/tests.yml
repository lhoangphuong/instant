name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest-and-game-rules:
    name: Python + game rule tests (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run tests (unittest: build artifact + Snake rules via Node)
        run: python3 -m unittest discover -s tests -p "test_*.py" -v
