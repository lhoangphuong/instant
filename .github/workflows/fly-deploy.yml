name: Fly deploy

on:
  push:
    branches: [main]

concurrency:
  group: fly-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@1.5

      # Incoming Webhook must target #cursor-chat; repo secret SLACK_WEBHOOK_URL.
      - name: Notify Slack — deploy started (#cursor-chat)
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: bash .github/scripts/slack-notify.sh start

      - name: Start deploy timer
        run: echo "DEPLOY_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Notify Slack — deploy succeeded (#cursor-chat)
        if: success()
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          END=$(date +%s)
          if [[ -n "${DEPLOY_STARTED_AT:-}" ]]; then
            SEC=$((END - DEPLOY_STARTED_AT))
          else
            SEC=0
          fi
          bash .github/scripts/slack-notify.sh success "$SEC"

      - name: Notify Slack — deploy failed (#cursor-chat)
        if: failure()
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          END=$(date +%s)
          if [[ -n "${DEPLOY_STARTED_AT:-}" ]]; then
            SEC=$((END - DEPLOY_STARTED_AT))
          else
            SEC=0
          fi
          bash .github/scripts/slack-notify.sh failure "$SEC"
