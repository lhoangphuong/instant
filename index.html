<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Snake</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-effects" aria-hidden="true"></div>

  <main class="shell">
    <header class="top">
      <div class="brand">
        <span class="brand__mark"></span>
        <div class="brand__text">
          <h1>Snake</h1>
          <p class="subtitle">Classic grid · smooth moves</p>
        </div>
      </div>
      <div class="score-chip" aria-live="polite">
        <span class="score-chip__label">Score</span>
        <strong id="score">0</strong>
      </div>
    </header>

    <section class="stage" aria-label="Game stage">
      <div class="playfield">
        <canvas id="game" width="400" height="400" aria-label="Snake game area"></canvas>

        <div id="overlay" class="overlay" hidden>
          <p class="overlay__title">Game over</p>
          <button type="button" id="restart" class="btn btn--primary">Play again</button>
        </div>
      </div>

      <p id="hint" class="hint">Press arrow keys / use pad to move</p>
    </section>

    <footer class="controls">
      <div class="dpad" role="group" aria-label="Movement">
        <button type="button" class="dpad__btn dpad__btn--up" data-dir="up" aria-label="Up">↑</button>
        <button type="button" class="dpad__btn dpad__btn--left" data-dir="left" aria-label="Left">←</button>
        <span class="dpad__center" aria-hidden="true"></span>
        <button type="button" class="dpad__btn dpad__btn--right" data-dir="right" aria-label="Right">→</button>
        <button type="button" class="dpad__btn dpad__btn--down" data-dir="down" aria-label="Down">↓</button>
      </div>
      <p class="hint hint--muted">Swipe or tap arrows — keyboard arrows work everywhere</p>
    </footer>
  </main>
  <script src="game.js"></script>
</body>
</html>
