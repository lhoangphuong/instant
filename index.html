<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Snake</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-effects" aria-hidden="true"></div>

  <main class="shell">
    <header class="top">
      <div class="brand">
        <span class="brand__mark"></span>
        <div class="brand__text">
          <div class="brand__heading">
            <h1>Snake</h1>
            <span class="version-badge">v2.5</span>
          </div>
          <p class="subtitle">Tests + prism hazards & combos</p>
        </div>
      </div>
      <div class="score-stack" aria-live="polite">
        <div class="score-chip">
          <span class="score-chip__label">Score</span>
          <strong id="score">0</strong>
        </div>
        <div class="score-chip score-chip--best">
          <span class="score-chip__label">Best</span>
          <strong id="best-score">0</strong>
        </div>
      </div>
    </header>

    <section class="stage" aria-label="Game stage">
      <div class="playfield">
        <canvas id="game" width="400" height="400" aria-label="Snake game area"></canvas>

        <div id="overlay" class="overlay" hidden>
          <p class="overlay__title">Game over</p>
          <button type="button" id="restart" class="btn btn--primary">Play again</button>
        </div>
      </div>

      <p id="hint" class="hint">Press arrows, swipe, or use pad to move</p>
      <div class="status-strip" aria-live="polite">
        <span>Level <strong id="level">1</strong></span>
        <span>Speed <strong id="speed">8</strong>x</span>
        <span>Combo <strong id="combo">1x</strong></span>
        <span>Hazards <strong id="hazards">0</strong></span>
        <span id="bonus-status">Bonus ready</span>
      </div>
    </section>

    <footer class="controls">
      <div class="dpad" role="group" aria-label="Movement">
        <button type="button" class="dpad__btn dpad__btn--up" data-dir="up" aria-label="Up">↑</button>
        <button type="button" class="dpad__btn dpad__btn--left" data-dir="left" aria-label="Left">←</button>
        <span class="dpad__center" aria-hidden="true"></span>
        <button type="button" class="dpad__btn dpad__btn--right" data-dir="right" aria-label="Right">→</button>
        <button type="button" class="dpad__btn dpad__btn--down" data-dir="down" aria-label="Down">↓</button>
      </div>
      <p class="hint hint--muted">Chain snacks for combo points — Space or P pauses — crystal hazards bite</p>
    </footer>
  </main>
  <script src="game-core.js"></script>
  <script src="game.js"></script>
</body>
</html>
