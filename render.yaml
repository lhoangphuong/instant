# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Inspired by IaC-style blueprints (e.g. fastapi projects that ship render.yaml).
# This repo is static-only (HTML/CSS/JS at the root); no build step.
#
# Setup: Dashboard → New → Blueprint → choose the Git repo that contains this file.

services:
  - type: web
    name: instant
    runtime: static
    # Non-Docker services require buildCommand; no-op for prebuilt static files at repo root
    buildCommand: "true"
    staticPublishPath: ./
    branch: main
    autoDeployTrigger: commit
